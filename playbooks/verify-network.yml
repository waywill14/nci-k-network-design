---
# Verify NCI-K network health across all devices
# Usage: ansible-playbook playbooks/verify-network.yml -i inventory/hosts.yml

- name: NCI-K Network Verification
  hosts: all
  gather_facts: false

  tasks:
    - name: Check interface status
      cisco.ios.ios_command:
        commands: show ip interface brief
      register: interfaces

    - name: Check VLAN status (switches only)
      cisco.ios.ios_command:
        commands: show vlan brief
      register: vlans
      when: inventory_hostname in ["meraki-sw", "huawei-server-sw"]

    - name: Check OSPF neighbours (routers only)
      cisco.ios.ios_command:
        commands: show ip ospf neighbor
      register: ospf
      when: inventory_hostname in ["core-router", "edge-router"]

    - name: Check VPN status (edge router only)
      cisco.ios.ios_command:
        commands:
          - show crypto isakmp sa
          - show crypto ipsec sa
      register: vpn
      when: inventory_hostname == "edge-router"

    - name: Check spanning tree (switches only)
      cisco.ios.ios_command:
        commands: show spanning-tree summary
      register: stp
      when: inventory_hostname in ["meraki-sw", "huawei-server-sw"]

    - name: Print all results
      debug:
        msg:
          - "{{ interfaces.stdout_lines }}"